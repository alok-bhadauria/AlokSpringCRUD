<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f3f4f6;
            --card: #ffffff;
            --border: #e5e7eb;
            --text: #111827;
            --muted: #6b7280;
            --danger: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        .wrapper {
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 1.5rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .full {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.9rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        button {
            padding: 0.5rem 1rem;
            border-radius: 6px;
            border: none;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: #f3f4f6;
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 0.75rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            color: var(--muted);
            font-weight: 500;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        .actions {
            display: flex;
            gap: 0.4rem;
        }

        .actions button {
            font-size: 0.75rem;
            padding: 0.35rem 0.7rem;
        }

        .hidden {
            display: none;
        }

        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="wrapper">

        <center>
            <h1>Student Portal<br>A springboot CRUD project by Alok Bhadauria</h1>
        </center>

        <div class="card">
            <form id="studentForm">
                <input type="hidden" id="studentId">

                <div class="form-grid">
                    <div>
                        <label>Full Name</label>
                        <input type="text" id="name" required>
                    </div>

                    <div>
                        <label>Email</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="full">
                        <label>Course</label>
                        <input type="text" id="course" required>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" id="cancelBtn" class="btn-secondary hidden">Cancel</button>
                    <button type="submit" id="submitBtn" class="btn-primary">Add Student</button>
                </div>
            </form>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody"></tbody>
            </table>
        </div>

    </div>

    <script>
        const API_URL = '/students';
        let isEditing = false;

        document.addEventListener('DOMContentLoaded', fetchStudents);

        const form = document.getElementById('studentForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('studentId').value;
            const student = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course: document.getElementById('course').value
            };

            if (isEditing) {
                await updateStudent(id, student);
            } else {
                await createStudent(student);
            }

            resetForm();
            fetchStudents();
        });

        document.getElementById('cancelBtn').addEventListener('click', resetForm);

        async function fetchStudents() {
            const res = await fetch(API_URL);
            const students = await res.json();
            renderTable(students);
        }

        async function createStudent(student) {
            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(student)
            });
        }

        async function updateStudent(id, student) {
            await fetch(`${API_URL}/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(student)
            });
        }

        async function deleteStudent(id) {
            if (confirm('Delete this student?')) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                fetchStudents();
            }
        }

        function editStudent(id, name, email, course) {
            document.getElementById('studentId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('email').value = email;
            document.getElementById('course').value = course;

            document.getElementById('submitBtn').textContent = 'Update Student';
            document.getElementById('cancelBtn').classList.remove('hidden');
            isEditing = true;
        }

        function resetForm() {
            form.reset();
            document.getElementById('studentId').value = '';
            document.getElementById('submitBtn').textContent = 'Add Student';
            document.getElementById('cancelBtn').classList.add('hidden');
            isEditing = false;
        }

        function renderTable(students) {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';

            students.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>${s.course}</td>
                    <td class="actions">
                        <button class="btn-secondary" onclick="editStudent(${s.id}, '${s.name}', '${s.email}', '${s.course}')">Edit</button>
                        <button class="btn-danger" onclick="deleteStudent(${s.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>

</body>

</html>
