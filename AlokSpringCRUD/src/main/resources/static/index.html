<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f8fafc;
            --text-muted: #cbd5e1;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--surface);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2), 0 10px 10px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h1 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 2rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.25rem;
            margin-bottom: 2.5rem;
            background: rgba(255, 255, 255, 0.02);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        label {
            font-size: 0.875rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.875rem;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        button.danger {
            background: var(--danger);
        }

        button.danger:hover {
            background: var(--danger-hover);
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            margin-top: 1rem;
        }

        th,
        td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        tr {
            transition: all 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .actions button {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Student Portal</h1>

        <form id="studentForm">
            <input type="hidden" id="studentId">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" required placeholder="john@example.com">
            </div>
            <div class="form-group full-width">
                <label for="course">Course</label>
                <input type="text" id="course" required placeholder="e.g. Computer Science">
            </div>
            <div class="form-group full-width" style="flex-direction: row; justify-content: flex-end; gap: 1rem;">
                <button type="button" id="cancelBtn" class="hidden"
                    style="background: transparent; border: 1px solid rgba(255,255,255,0.2);">Cancel</button>
                <button type="submit" id="submitBtn">Add Student</button>
            </div>
        </form>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="studentTableBody">
                    <!-- Data will be populated here by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = '/students';
        let isEditing = false;

        // Load students on page load
        document.addEventListener('DOMContentLoaded', fetchStudents);

        const form = document.getElementById('studentForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const id = document.getElementById('studentId').value;
            const student = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                course: document.getElementById('course').value
            };

            if (isEditing) {
                await updateStudent(id, student);
            } else {
                await createStudent(student);
            }

            resetForm();
            fetchStudents();
        });

        document.getElementById('cancelBtn').addEventListener('click', resetForm);

        async function fetchStudents() {
            try {
                const res = await fetch(API_URL);
                const students = await res.json();
                renderTable(students);
            } catch (error) {
                console.error('Error fetching students:', error);
            }
        }

        async function createStudent(student) {
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(student)
                });
            } catch (error) {
                console.error('Error creating student:', error);
            }
        }

        async function updateStudent(id, student) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(student)
                });
            } catch (error) {
                console.error('Error updating student:', error);
            }
        }

        async function deleteStudent(id) {
            if (confirm('Are you sure you want to delete this student?')) {
                try {
                    await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE'
                    });
                    fetchStudents();
                } catch (error) {
                    console.error('Error deleting student:', error);
                }
            }
        }

        function editStudent(id, name, email, course) {
            document.getElementById('studentId').value = id;
            document.getElementById('name').value = name;
            document.getElementById('email').value = email;
            document.getElementById('course').value = course;

            document.getElementById('submitBtn').textContent = 'Update Student';
            document.getElementById('cancelBtn').classList.remove('hidden');
            isEditing = true;
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function resetForm() {
            form.reset();
            document.getElementById('studentId').value = '';
            document.getElementById('submitBtn').textContent = 'Add Student';
            document.getElementById('cancelBtn').classList.add('hidden');
            isEditing = false;
        }

        function renderTable(students) {
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = '';

            students.forEach(s => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>#${s.id}</td>
                    <td>${s.name}</td>
                    <td>${s.email}</td>
                    <td>${s.course}</td>
                    <td class="actions">
                        <button onclick="editStudent(${s.id}, '${s.name}', '${s.email}', '${s.course}')" style="background: rgba(255,255,255,0.1)">Edit</button>
                        <button onclick="deleteStudent(${s.id})" class="danger">Delete</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }
    </script>
</body>

</html>
